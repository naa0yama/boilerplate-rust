# Project-specific task overrides.
# Tasks defined here take precedence over tasks.toml because this file
# appears LAST in the task_config.includes array in mise.toml.

["wireframe"]
description = "Launch GrapesJS wireframe builder"
run = "pnpm --dir tools/wireframe exec serve . -l 3001"

# Override: call gen_mcp_json.py instead of inline heredoc (project uses dynamic MCP registry)
[o2]
description = "Start OpenObserve (OTLP HTTP via :5080, UI :5080)"
env = { OTEL_EXPORTER_OTLP_ENDPOINT = "" }
run = """
#!/usr/bin/env bash
set -euo pipefail

if ! command -v openobserve > /dev/null 2>&1; then
  echo 'Error: openobserve not found. Run "mise run o2:install" first.' >&2
  exit 1
fi
if pgrep -x openobserve > /dev/null 2>&1; then
  echo 'OpenObserve is already running.'
  exit 0
fi
rm -rf /tmp/openobserve-data
. .devcontainer/o2-env.sh
_root="$(pwd)"
setsid bash -c ". ${_root}/.devcontainer/o2-env.sh && openobserve" >/dev/null 2>&1 &
timeout 60 bash -c 'until curl -sf --max-time 1 http://localhost:5080/healthz > /dev/null 2>&1; do sleep 0.5; done'
python3 .devcontainer/gen_mcp_json.py
bash .devcontainer/o2-import-dashboards.sh
echo 'OpenObserve started (UI: http://localhost:5080, MCP: .mcp.json)'
"""

# Override: exclude node_modules from testdata policy scan (pnpm workspace produces node_modules)
["ast-grep:text"]
description = "grep-P testdata-policy check for md/json/jsonl (RFC-reserved values only)"
run = """
#!/usr/bin/env bash
set -euo pipefail

# ast-grep generic language is not supported in 0.42.x; use grep -P (ugrep PCRE2) instead.
# Output format: [rule-id] description\\n  file:line:content  (one per violation)
_text_check() {
  local id="$1" msg="$2" pat="$3" excl="${4:-}"
  local raw="" out=""
  raw=$(grep -rn -P "$pat" \
    --include='*.md' --include='*.json' --include='*.jsonl' \
    --exclude-dir=target --exclude-dir='.claude' \
    --exclude-dir=data --exclude-dir=tmp \
    --exclude-dir=node_modules \
    . 2>/dev/null || true)
  if [ -n "$excl" ] && [ -n "$raw" ]; then
    out=$(printf '%s\\n' "$raw" | grep -vP "$excl" || true)
  else
    out="$raw"
  fi
  if [ -n "$out" ]; then
    out=$(printf '%s\\n' "$out" | grep -v 'testdata-ok' || true)
  fi
  if [ -n "$out" ]; then
    printf '\\n[%s] %s\\n%s\\n' "$id" "$msg" "$out" >&2
    return 1
  fi
}

_failed=0
_text_check 'no-real-ipv4-text' \
  'real IPv4 — use RFC-reserved range (198.51.100.x / 192.0.2.x / 10.x)' \
  '\\b(?:(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\\.){3}(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])(?:/\\d{1,2})?\\b' \
  '\\b(?:10\\.|127\\.|169\\.254\\.|172\\.(?:1[6-9]|2\\d|3[01])\\.|192\\.168\\.|192\\.0\\.2\\.|198\\.51\\.100\\.|203\\.0\\.113\\.|0\\.0\\.0\\.0|100\\.(?:6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\\.|22[4-9]\\.|2[3-5][0-9]\\.)' \
  || _failed=1
_text_check 'no-real-ipv6-text' \
  'real IPv6 — use 2001:db8:: documentation prefix' \
  '(?:[0-9a-fA-F]{1,4}:){2,7}[0-9a-fA-F]{0,4}' \
  '(?:2001:[Dd][Bb]8:|::1\\b|[Ff][Ee]80::|T?[0-2][0-9]:[0-5][0-9]:[0-5][0-9]|\\b[0-9a-fA-F]{2}:[0-9a-fA-F]{2}:[0-9a-fA-F]{2}\\b|\\bscale=\\d{3,4}:\\d{3,4}\\b)' \
  || _failed=1
_text_check 'no-real-asn-text' \
  'real ASN — use RFC 5398 documentation range AS64496-AS64511' \
  '\\b[Aa][Ss]\\d+\\b' \
  '\\b[Aa][Ss](?:6449[6-9]|6450[0-9]|6451[01])\\b' \
  || _failed=1
_text_check 'no-real-fqdn-text' \
  'FQDN uses non-RFC-reserved domain — use example.com / example.net / example.org / .invalid' \
  '\\b(?:xe|ge|et|lo)-\\d+-\\d+-\\d+\\.' \
  '\\.(?:example\\.(?:com|net|org)|invalid)\\b' \
  || _failed=1
exit "$_failed"
"""

# Project-specific tasks (not in boilerplate tasks.toml)
["brust-web:serve"]
description = "Start brust-web dev server"
run = 'cargo run -p brust-web -- serve --bind 0.0.0.0:3000'

["setup:playwright"]
description = "Install @playwright/mcp deps and download Chromium browser"
run = """
#!/usr/bin/env bash
set -euo pipefail

# Locate the package.json that declares @playwright/mcp (works before pnpm install)
_pnpm_dir=$(grep -rl '"@playwright/mcp"' --include='package.json' . \
  | grep -v node_modules | head -1 | xargs dirname)
if [ -z "$_pnpm_dir" ]; then
  echo "Error: no package.json with @playwright/mcp found" >&2
  exit 1
fi

pnpm --dir "$_pnpm_dir" install --frozen-lockfile

_playwright_cli=$(find "$_pnpm_dir/node_modules/.pnpm" -name "cli.js" -path "*/playwright/cli.js" | head -1)
if [ -z "$_playwright_cli" ]; then
  echo "Error: playwright cli.js not found in pnpm store" >&2
  exit 1
fi
node "$_playwright_cli" install chromium

. .devcontainer/o2-env.sh
python3 .devcontainer/gen_mcp_json.py
echo "Playwright MCP ready. Run /mcp in Claude Code to reload."
"""
