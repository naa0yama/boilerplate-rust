<!doctype html>
<html data-theme="light">
<head>
  <meta charset="utf-8" />
  <link href="./node_modules/grapesjs/dist/css/grapes.min.css" rel="stylesheet" />
  <link href="./node_modules/daisyui/daisyui.css" rel="stylesheet" />
  <script src="./node_modules/grapesjs/dist/grapes.min.js"></script>
  <!-- Tailwind is needed here (not just the canvas iframe) so Blocks-panel
       thumbnails render DaisyUI components with correct utilities. -->
  <script src="./node_modules/@tailwindcss/browser/dist/index.global.js"></script>
  <style>
    html,body{margin:0;height:100%}
    #gjs{height:100%}
    /* Blocks-panel thumbnails: render the actual DaisyUI component at reduced
       scale so users can visually identify each block. Pointer events are
       disabled so the preview never intercepts the drag interaction. */
    .gjs-block .wf-block-preview{
      transform: scale(0.35);
      transform-origin: top left;
      width: 285%;              /* 100 / 0.35 to fill the block tile */
      height: 285%;
      pointer-events: none;
      overflow: hidden;
      /* Confine position:fixed descendants (Drawer/Toast/Modal) to the
         thumbnail box instead of the viewport. */
      position: relative;
      contain: layout paint;
    }
    .gjs-block{ overflow: hidden; }
  </style>
</head>
<body>
  <div id="gjs"></div>
  <script type="module">
    import { daisyBlocks } from './blocks/daisy-blocks.js';
    const editor = grapesjs.init({
      container: '#gjs',
      height: '100vh',
      fromElement: false,
      storageManager: false,
      canvas: {
        styles:  ['./node_modules/daisyui/daisyui.css'],
        scripts: ['./node_modules/@tailwindcss/browser/dist/index.global.js'],
      },
      blockManager: { blocks: daisyBlocks },
    });
    editor.onReady(() => {
      editor.Canvas.getDocument()
        .documentElement.setAttribute('data-theme', 'light');
      // Open the Blocks panel by default so DaisyUI components are visible
      // without requiring a click on the right-hand toolbar.
      editor.runCommand('open-blocks');
    });
    window.editor = editor;
  </script>
</body>
</html>
